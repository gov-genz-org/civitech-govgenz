version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: civitech_backend
    restart: unless-stopped
    env_file:
      - .env
    # Port 8000 NON exposé à l'hôte : accessible uniquement via Nginx (réseau Docker interne)
    # Ne jamais ajouter ports: 8000:8000 ici — cela exposerait l'API directement sur internet
    expose:
      - "8000"
    networks:
      - civitech_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_GA_MEASUREMENT_ID=${VITE_GA_MEASUREMENT_ID:-}
    container_name: civitech_frontend
    restart: unless-stopped
    networks:
      - civitech_net
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: civitech_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - civitech_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: civitech_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    networks:
      - civitech_net
    depends_on:
      - backend
      - frontend
      - redis

networks:
  civitech_net:
    driver: bridge

volumes:
  nginx_logs:
